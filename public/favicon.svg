<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A859"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Modern base shape with smooth rounded corners -->
  <rect width="512" height="512" rx="140" fill="url(#greenGrad)" filter="url(#glow)"/>
  
  <!-- Outer glowing tech-ring representing telemetry and continuous monitoring -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-dasharray="40 25" opacity="0.6"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#A7F3D0" stroke-width="4" stroke-dasharray="10 15" opacity="0.4"/>
  
  <!-- High-tech sugarcane sprout nodes in the center upper part -->
  <path d="M256 85 C275 155, 325 200, 370 210 C315 200, 275 175, 256 120 C237 175, 197 200, 142 210 C187 200, 237 155, 256 85 Z" fill="#FFFFFF"/>
  <path d="M256 140 C265 190, 300 220, 330 225 C295 220, 270 200, 256 165 C242 200, 217 220, 182 225 C212 220, 247 190, 256 140 Z" fill="#A7F3D0" opacity="0.8"/>
  
  <!-- Modern Agricultural Smart Tractor / Machine silhouette -->
  <path d="M150 330 L175 260 H245 V330 H325 L345 285 H390 V335 H410 V370 H390 L375 420 H335 L350 370 H250 L235 420 H190 L205 370 H150 Z" fill="#FFFFFF"/>
  
  <!-- Back Big Wheel (Detailed with mechanical gears for Agroindústria) -->
  <circle cx="355" cy="405" r="50" fill="#004D22" stroke="#FFFFFF" stroke-width="12"/>
  <circle cx="355" cy="405" r="22" fill="#FFFFFF"/>
  <circle cx="355" cy="405" r="8" fill="#004D22"/>
  
  <!-- Front Small Wheel (Detailed) -->
  <circle cx="212" cy="415" r="32" fill="#004D22" stroke="#FFFFFF" stroke-width="9"/>
  <circle cx="212" cy="415" r="14" fill="#FFFFFF"/>
  <circle cx="212" cy="415" r="5" fill="#004D22"/>

  <!-- Satellite Signal / Telemetry waves -->
  <path d="M110 230 Q256 130 402 230" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 18" opacity="0.9"/>
  <circle cx="110" cy="230" r="14" fill="#FFFFFF"/>
  <circle cx="402" cy="230" r="14" fill="#FFFFFF"/>
  
  <!-- Tech-Connection Nodes -->
  <circle cx="256" cy="245" r="10" fill="#A7F3D0"/>
  <line x1="110" y1="230" x2="182" y2="225" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
  <line x1="402" y1="230" x2="330" y2="225" stroke="#FFFFFF" stroke-width="3" opacity="0.5"/>
</svg>
